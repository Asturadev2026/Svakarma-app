# Maestro flow: Login — EXPO GO variant (physical phone or emulator).
#
# BEFORE EVERY RUN — reset the app to the Splash screen:
#   Press `r` in the `npx expo start` terminal  (or shake phone → Reload).
#   The app must show the "Get Started →" button before you run this flow.
#
# Demo number 9999999999 → OTP 123456 (auto-filled). Reaching Permissions needs
# an already-onboarded number (see MAESTRO_TESTING.md §3).

appId: host.exp.exponent
---
# launchApp opens Expo Go's own home screen (not your project directly).
# Press `r` in the `npx expo start` terminal BEFORE running this flow
# so the app reloads to Splash. Then this flow taps into it from Expo Go's home.
- launchApp

# Expo Go home shows "Recently opened" list — tap the first myapp entry.
# This opens your Svakarma project inside Expo Go.
- tapOn: "myapp"

# Wait for the Svakarma app bundle to load
- extendedWaitUntil:
    visible:
      text: "Get Started →"
    timeout: 15000

# Splash — Svakarma app is now loaded
- assertVisible: "Get Started →"
- tapOn: "Get Started →"

# Login screen
- assertVisible: "Welcome"
- tapOn: "98765 43210"
- inputText: "9999999999"
- hideKeyboard
- tapOn: "Send OTP"

# OTP screen
# The mock backend returns devOtp=123456 which auto-fills and shows the banner.
# Full banner label text: "DEMO MODE · mock SMS provider"
- assertVisible: "Verify Mobile"
- assertVisible: "DEMO MODE · mock SMS provider"
- assertVisible: "Verify & Proceed"
- tapOn: "Verify & Proceed"

# Landed past login (onboarded number → Permissions screen)
- assertVisible: "A few permissions"
