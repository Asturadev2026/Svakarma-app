# Maestro flow: Login — EXPO GO variant (physical phone or emulator).
#
# Expo Go can't be deep-launched to your project by Maestro, so there is NO
# `launchApp` here — the flow runs against whatever is on screen. Before running:
#   1. Open the app in Expo Go and let it land on the Splash screen
#      (shake → Reload, or press `r` in the `expo start` terminal, to reset it).
#   2. Make sure `adb devices` lists your phone (USB debugging on, connected).
#   3. Backend running in mock mode + reachable.
#
# Demo number 9999999999 → OTP 123456 (auto-filled). Reaching Permissions needs
# an already-onboarded number (see MAESTRO_TESTING.md §3).

appId: host.exp.exponent
---
# Splash → Login
- assertVisible: "Get Started"
- tapOn: "Get Started"

# Login
- assertVisible: "Welcome"
- tapOn: "98765 43210"
- inputText: "9999999999"
- hideKeyboard
- tapOn: "Send OTP"

# OTP (mock provider auto-fills the demo code)
- assertVisible: "Verify Mobile"
- assertVisible: "DEMO MODE"
- tapOn: "Verify & Proceed"

# Landed past login
- assertVisible: "A few permissions"
